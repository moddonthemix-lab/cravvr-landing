project_id = "coqwihsmmigktqqdnmis"

# Stripe webhook is signed by Stripe (not by a Supabase JWT), so we skip
# Supabase's JWT gate. The function itself verifies the Stripe-Signature header.
[functions.stripe-webhook]
verify_jwt = false

# Square's webhook is signed by Square (HMAC-SHA256 with merchant signature key);
# our function verifies the signature itself.
[functions.square-webhook]
verify_jwt = false

# Square redirects the merchant browser here after OAuth consent. There is no
# Supabase JWT on the redirect; we validate via signed `state` parameter.
[functions.square-oauth-callback]
verify_jwt = false

# Clerk webhook is signed by Svix/Clerk, not by a Supabase JWT.
[functions.clerk-webhook]
verify_jwt = false

# Functions called from a Clerk-authenticated browser. Supabase's edge
# function JWT gate doesn't honor Third-Party Auth (only PostgREST does),
# so Clerk JWTs fail the gate with 401. These functions verify the Clerk
# JWT themselves via _shared/clerk-auth.ts.
[functions.stripe-connect-onboard]
verify_jwt = false

[functions.stripe-create-payment-intent]
verify_jwt = false

[functions.stripe-refund]
verify_jwt = false

[functions.square-connect-init]
verify_jwt = false

[functions.square-create-payment]
verify_jwt = false

[functions.square-refund]
verify_jwt = false

[functions.cravvr-checkout-session]
verify_jwt = false

[functions.cravvr-customer-portal]
verify_jwt = false
